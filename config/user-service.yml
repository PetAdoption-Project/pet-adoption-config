server:
  port: 8081

spring:
  application:
    name: user-service

  datasource:
    url: ${DATA_SOURCE_URL}
    username: pet_user
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      database-platform: org.hibernate.dialect.PostgreSQLDialect
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration